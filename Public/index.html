<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<title>Kundli Career Horoscope</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    min-height: 100vh;
    background:
      radial-gradient(circle at 15% 10%, rgba(255,215,140,0.15) 0%, transparent 35%),
      radial-gradient(circle at 85% 20%, rgba(255,255,255,0.08) 0%, transparent 30%),
      radial-gradient(circle at 50% 80%, rgba(255,180,90,0.1) 0%, transparent 40%),
      linear-gradient(160deg, #2b1055 0%, #4a1942 35%, #6b1f3a 65%, #8a2f1f 100%);
    color: #f5ead8;
    background-attachment: fixed;
  }
  h1 {
    font-size: 22px;
    color: #ffd77a;
    text-align: center;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    margin-bottom: 24px;
    letter-spacing: 0.3px;
  }
  label { display: block; margin-top: 14px; font-weight: 600; font-size: 13px; color: #f0d9b5; letter-spacing: 0.3px; }
  input, select {
    width: 100%;
    padding: 11px;
    margin-top: 5px;
    border: 1px solid rgba(255,215,140,0.35);
    border-radius: 8px;
    box-sizing: border-box;
    font-size: 14px;
    background: rgba(255,255,255,0.95);
    color: #2b2b2b;
  }
  input:focus, select:focus {
    outline: none;
    border-color: #ffd77a;
    box-shadow: 0 0 0 3px rgba(255,215,140,0.25);
  }
  button {
    margin-top: 20px;
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #d98324, #b5501a);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(217,131,36,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  button:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(217,131,36,0.45); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  #result {
    margin-top: 24px;
    padding: 18px;
    background: rgba(255,255,255,0.97);
    border-radius: 12px;
    border: 1px solid rgba(255,215,140,0.4);
    line-height: 1.7;
    white-space: pre-wrap;
    display: none;
    color: #2b2b2b;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
  }
  .hint { font-size: 12px; color: #d8c3a0; margin-top: 5px; }
  .card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,215,140,0.2);
    border-radius: 14px;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .time-row { display: flex; gap: 8px; margin-top: 5px; }
  .time-row select { margin-top: 0; }
</style>
</head>
<body>
  <h1>🔮 Kundli AI — Discover Your Destiny</h1>

  <!-- ============ LOGIN SCREEN ============ -->
  <div id="loginScreen" class="card">
    <label>Email</label>
    <input id="loginEmail" type="email" placeholder="e.g. rahul@gmail.com" />

    <button id="sendOtpBtn" onclick="sendOtp()">Send OTP</button>

    <div id="otpSection" style="display:none;">
      <label>OTP</label>
      <input id="otpInput" placeholder="6-digit code" maxlength="6" />
      <button id="verifyOtpBtn" onclick="verifyOtp()">Verify</button>
    </div>

    <div id="loginInfo" style="color:#8fe3a3; font-size:13px; margin-top:8px;"></div>
    <div id="loginError" style="color:#ff9d9d; font-size:13px; margin-top:8px;"></div>
  </div>

  <script>
    // ============ FIREBASE SETUP ============
    // NOTE: Ye config values secret nahi hain, browser mein safely dikhti hain
    const firebaseConfig = {
      apiKey: "AIzaSyCe5vjYLj0HtDzyMwmohma6gMp7eC82Ttw",
      authDomain: "kundliapp-f831d.firebaseapp.com",
      projectId: "kundliapp-f831d",
      storageBucket: "kundliapp-f831d.firebasestorage.app",
      messagingSenderId: "932575463048",
      appId: "1:932575463048:web:5a09387cc067f3fb69813d",
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Step 1: User email daal ke button dabata hai — 6-digit OTP bhej dete hain
    async function sendOtp() {
      const errorDiv = document.getElementById("loginError");
      const infoDiv = document.getElementById("loginInfo");
      errorDiv.textContent = "";
      infoDiv.textContent = "";
      const email = document.getElementById("loginEmail").value.trim();

      if (!email) {
        errorDiv.textContent = "Please enter a valid email";
        return;
      }

      const btn = document.getElementById("sendOtpBtn");
      btn.disabled = true;
      btn.textContent = "Sending...";

      try {
        const res = await fetch("/api/auth/send-otp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Error sending OTP");

        document.getElementById("otpSection").style.display = "block";
        infoDiv.textContent = "✅ OTP sent to your email (check spam folder too).";
        btn.textContent = "Sent ✓";
      } catch (err) {
        errorDiv.textContent = "Error: " + err.message;
        btn.disabled = false;
        btn.textContent = "Send OTP";
      }
    }

    // Step 2: User OTP type karke Verify dabata hai
    async function verifyOtp() {
      const errorDiv = document.getElementById("loginError");
      errorDiv.textContent = "";
      const email = document.getElementById("loginEmail").value.trim();
      const otp = document.getElementById("otpInput").value.trim();

      if (!otp) {
        errorDiv.textContent = "Please enter the OTP";
        return;
      }

      const btn = document.getElementById("verifyOtpBtn");
      btn.disabled = true;
      btn.textContent = "Verifying...";

      try {
        // Backend se OTP verify karwao, badle mein custom token milega
        const otpRes = await fetch("/api/auth/verify-otp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, otp }),
        });
        const otpData = await otpRes.json();
        if (!otpRes.ok) throw new Error(otpData.error || "Incorrect OTP");

        // Us custom token se Firebase mein sign-in complete karo
        const result = await auth.signInWithCustomToken(otpData.customToken);
        const idToken = await result.user.getIdToken();

        // Ab user ko database mein save/fetch karwao
        const res = await fetch("/api/auth/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ idToken }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Login failed");

        localStorage.setItem("kundli_uid", data.uid);
        localStorage.setItem("kundli_wallet", data.user.wallet);

        showMainApp(data.user.wallet);
      } catch (err) {
        errorDiv.textContent = "Error: " + err.message;
        btn.disabled = false;
        btn.textContent = "Verify";
      }
    }

    function showMainApp(wallet) {
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("mainApp").style.display = "block";
      document.getElementById("walletDisplay").textContent = "Wallet: ₹" + (wallet || 0);
    }

    // Wallet mein paisa add karne ka poora flow
    async function addMoney(amount) {
      const errorDiv = document.getElementById("walletError");
      errorDiv.textContent = "";
      const uid = localStorage.getItem("kundli_uid");

      try {
        // Step 1: Backend se order banwao
        const orderRes = await fetch("/api/wallet/create-order", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ amount }),
        });
        const orderData = await orderRes.json();
        if (!orderRes.ok) throw new Error(orderData.error || "Order banane mein error");

        // Step 2: Razorpay ka payment popup kholo
        const options = {
          key: orderData.keyId,
          amount: orderData.amount,
          currency: orderData.currency,
          order_id: orderData.orderId,
          name: "Kundli AI",
          description: "Wallet mein ₹" + amount + " add karo",
          handler: async function (response) {
            // Step 3: Payment ho jaye to backend se verify karwao
            try {
              const verifyRes = await fetch("/api/wallet/verify-payment", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  uid,
                  amount,
                  razorpay_order_id: response.razorpay_order_id,
                  razorpay_payment_id: response.razorpay_payment_id,
                  razorpay_signature: response.razorpay_signature,
                }),
              });
              const verifyData = await verifyRes.json();
              if (!verifyRes.ok) throw new Error(verifyData.error || "Verify nahi hua");

              // Wallet display update karo
              localStorage.setItem("kundli_wallet", verifyData.newWallet);
              document.getElementById("walletDisplay").textContent = "Wallet: ₹" + verifyData.newWallet;
              alert("✅ ₹" + amount + " wallet mein add ho gaye!");
            } catch (err) {
              errorDiv.textContent = "Payment verify error: " + err.message;
            }
          },
          theme: { color: "#b5501a" },
        };

        const rzp = new Razorpay(options);
        rzp.open();
      } catch (err) {
        errorDiv.textContent = "Error: " + err.message;
      }
    }

    function logout() {
      auth.signOut();
      localStorage.removeItem("kundli_uid");
      localStorage.removeItem("kundli_wallet");
      location.reload();
    }

    // Page load hote hi check karo — agar pehle se login hai to seedha app dikhao
    window.addEventListener("DOMContentLoaded", () => {
      const savedUid = localStorage.getItem("kundli_uid");
      const savedWallet = localStorage.getItem("kundli_wallet");
      if (savedUid) {
        showMainApp(savedWallet);
      }
    });
  </script>


  <!-- ============ MAIN APP (login ke baad dikhega) ============ -->
  <div id="mainApp" style="display:none;">
    <div class="card" style="margin-bottom:16px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <span class="hint" id="walletDisplay" style="font-size:15px; color:#ffd77a; font-weight:600;">Wallet: ₹0</span>
      <span class="hint" style="cursor:pointer; text-decoration:underline;" onclick="logout()">Logout</span>
    </div>

    <div style="display:flex; gap:8px;">
      <button style="width:auto; margin-top:0; padding:8px 14px; font-size:13px;" onclick="addMoney(100)">+ ₹100</button>
      <button style="width:auto; margin-top:0; padding:8px 14px; font-size:13px;" onclick="addMoney(500)">+ ₹500</button>
      <button style="width:auto; margin-top:0; padding:8px 14px; font-size:13px;" onclick="addMoney(1000)">+ ₹1000</button>
    </div>
    <div id="walletError" style="color:#ff9d9d; font-size:13px; margin-top:8px;"></div>
    </div>

    <div class="card">
  <label>Full Name</label>
  <input id="name" placeholder="e.g. Rahul Sharma" />

  <label>Date of Birth</label>
  <input id="dob" type="date" min="1920-01-01" max="2026-12-31" />
  <div class="hint">Click the year in the calendar to jump quickly to older dates</div>

  <label>Time of Birth</label>
  <div class="time-row">
    <select id="tobHour"></select>
    <select id="tobMinute"></select>
    <select id="tobAmPm">
      <option value="AM">AM</option>
      <option value="PM">PM</option>
    </select>
  </div>

  <label>Birth Place</label>
  <input id="place" placeholder="e.g. Delhi, Mumbai, Haldwani..." autocomplete="off" />
  <div id="suggestions" style="
    position: relative;
    background: white;
    border: 1px solid #d8c3a5;
    border-radius: 8px;
    margin-top: 2px;
    max-height: 180px;
    overflow-y: auto;
    display: none;
  "></div>
  <div class="hint" id="selectedPlaceHint"></div>

  <!-- Ye hidden fields select hone pe khud bhar jayenge -->
  <input type="hidden" id="lat" />
  <input type="hidden" id="lon" />

  <button id="submitBtn" onclick="getHoroscope()">View Horoscope</button>
    </div>

  <div id="chartContainer" style="display:none; margin-top: 20px; text-align: center;">
    <h3 style="font-size: 15px; color: #ffd77a;">Your Kundli Chart (North Indian Style)</h3>
    <div id="chartSvgHolder" style="background:white; padding:12px; border-radius:10px; border:1px solid #eadfca;"></div>
  </div>

  <div id="result"></div>


  <!-- Chat Section - horoscope milne ke baad hi dikhega -->
  <div id="chatSection" class="card" style="display:none; margin-top: 24px;">
    <h3 style="font-size: 15px; color: #ffd77a;">💬 Ask a Question <span style="font-size:12px; color:#d8c3a0; font-weight:normal;">(₹5 per question)</span></h3>
    <div id="chatMessages" style="
      background: white;
      border: 1px solid #eadfca;
      border-radius: 10px;
      padding: 12px;
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 10px;
    "></div>
    <div style="display: flex; gap: 8px;">
      <input id="chatInput" placeholder="e.g. Will I get married this year?" style="flex:1;" />
      <button id="chatSendBtn" style="width:auto; margin-top:0; padding: 10px 16px;" onclick="sendChatMessage()">Send</button>
    </div>
  </div>

  <script>
    // Time of Birth ke liye Hour/Minute dropdowns bharte hain (12-hour format, AM/PM ke saath)
    const hourSelect = document.getElementById("tobHour");
    const minuteSelect = document.getElementById("tobMinute");
    for (let h = 1; h <= 12; h++) {
      const opt = document.createElement("option");
      opt.value = h;
      opt.textContent = h;
      hourSelect.appendChild(opt);
    }
    for (let m = 0; m < 60; m++) {
      const opt = document.createElement("option");
      opt.value = m;
      opt.textContent = m.toString().padStart(2, "0");
      minuteSelect.appendChild(opt);
    }

    let selectedCity = null;
    let savedKundliData = null; // horoscope milne ke baad yahan save hoga, chat ke liye use hoga
    let savedName = "";
    let chatHistory = []; // conversation history taaki bot pichli baat yaad rakhe

    const placeInput = document.getElementById("place");
    const suggestionsBox = document.getElementById("suggestions");
    const hint = document.getElementById("selectedPlaceHint");
    let searchDebounceTimer = null;
    let currentMatches = [];

    placeInput.addEventListener("input", () => {
      const query = placeInput.value.trim();
      selectedCity = null;
      document.getElementById("lat").value = "";
      document.getElementById("lon").value = "";
      hint.textContent = "";

      // Pichla pending search cancel karo (debounce — bahut zyada requests na jayein)
      clearTimeout(searchDebounceTimer);

      if (query.length < 3) {
        suggestionsBox.style.display = "none";
        return;
      }

      suggestionsBox.innerHTML = `<div style="padding:8px 12px; color:#999;">Dhoond rahe hain...</div>`;
      suggestionsBox.style.display = "block";

      // 400ms wait karte hain taaki user type karna band kare, phir search karein
      searchDebounceTimer = setTimeout(async () => {
        try {
          const res = await fetch("/api/places?q=" + encodeURIComponent(query));
          const data = await res.json();
          currentMatches = data.results || [];

          if (currentMatches.length === 0) {
            suggestionsBox.innerHTML = `<div style="padding:8px 12px; color:#999;">Koi jagah nahi mili</div>`;
            return;
          }

          suggestionsBox.innerHTML = currentMatches
            .map(
              (c, i) =>
                `<div data-index="${i}" style="padding:8px 12px; cursor:pointer; border-bottom:1px solid #f0e6d2; font-size:13px;">
                  ${c.name}
                </div>`
            )
            .join("");

          // Har suggestion pe click listener lagate hain
          suggestionsBox.querySelectorAll("div[data-index]").forEach((el, i) => {
            el.addEventListener("click", () => {
              const place = currentMatches[i];
              selectedCity = place;
              placeInput.value = place.name;
              document.getElementById("lat").value = place.lat;
              document.getElementById("lon").value = place.lon;
              hint.textContent = `✓ Coordinates set: ${place.lat.toFixed(4)}, ${place.lon.toFixed(4)}`;
              suggestionsBox.style.display = "none";
            });
            el.addEventListener("mouseenter", () => (el.style.background = "#fdf6ec"));
            el.addEventListener("mouseleave", () => (el.style.background = "white"));
          });
        } catch (err) {
          suggestionsBox.innerHTML = `<div style="padding:8px 12px; color:red;">Search mein error aayi</div>`;
        }
      }, 400);
    });

    // Bahar click karne pe suggestions band ho jayen
    document.addEventListener("click", (e) => {
      if (e.target !== placeInput) {
        suggestionsBox.style.display = "none";
      }
    });

    async function getHoroscope() {
      const btn = document.getElementById("submitBtn");
      const resultDiv = document.getElementById("result");

      // 12-hour (AM/PM) selection ko 24-hour "HH:mm" format mein convert karte hain
      let hour12 = parseInt(document.getElementById("tobHour").value || "0", 10);
      const minute = parseInt(document.getElementById("tobMinute").value || "0", 10);
      const ampm = document.getElementById("tobAmPm").value;
      let hour24 = hour12 % 12;
      if (ampm === "PM") hour24 += 12;
      const tob = hour24.toString().padStart(2, "0") + ":" + minute.toString().padStart(2, "0");

      const payload = {
        name: document.getElementById("name").value,
        dob: document.getElementById("dob").value,
        tob: tob,
        lat: document.getElementById("lat").value,
        lon: document.getElementById("lon").value,
      };

      if (!payload.name || !payload.dob || !selectedCity) {
        alert("Please fill all fields and select your birth place from the list!");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Generating your Kundli...";
      resultDiv.style.display = "none";

      try {
        const res = await fetch("/api/horoscope", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || "Kuch galat ho gaya");

        // Agar chart mila hai to usko dikhao
        const chartContainer = document.getElementById("chartContainer");
        const chartHolder = document.getElementById("chartSvgHolder");
        if (data.chartSvg) {
          chartHolder.innerHTML = data.chartSvg;
          chartContainer.style.display = "block";
        } else {
          chartContainer.style.display = "none";
        }

        resultDiv.style.display = "block";
        resultDiv.textContent = data.careerHoroscope;

        // Chat ke liye data save karo aur chat section dikhao
        savedKundliData = data.kundliRaw;
        savedName = payload.name;
        chatHistory = [];
        document.getElementById("chatMessages").innerHTML = "";
        document.getElementById("chatSection").style.display = "block";
      } catch (err) {
        resultDiv.style.display = "block";
        resultDiv.textContent = "Error: " + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = "View Horoscope";
      }
    }
    async function sendChatMessage() {
      const input = document.getElementById("chatInput");
      const messagesBox = document.getElementById("chatMessages");
      const sendBtn = document.getElementById("chatSendBtn");
      const question = input.value.trim();

      if (!question) return;

      // User ka message turant dikhao
      messagesBox.innerHTML += `<div style="margin-bottom:10px; text-align:right;">
        <span style="background:#b5501a; color:white; padding:8px 12px; border-radius:10px; display:inline-block; max-width:80%;">${question}</span>
      </div>`;
      messagesBox.scrollTop = messagesBox.scrollHeight;
      input.value = "";
      sendBtn.disabled = true;

      try {
        const uid = localStorage.getItem("kundli_uid");
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            uid,
            name: savedName,
            kundliData: savedKundliData,
            question,
            history: chatHistory,
          }),
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || "Kuch galat ho gaya");

        // Bot ka jawab dikhao
        messagesBox.innerHTML += `<div style="margin-bottom:10px; text-align:left;">
          <span style="background:#fdf6ec; padding:8px 12px; border-radius:10px; display:inline-block; max-width:80%;">${data.answer}</span>
        </div>`;
        messagesBox.scrollTop = messagesBox.scrollHeight;

        // Wallet display update karo (₹5 kat gaya)
        localStorage.setItem("kundli_wallet", data.newWallet);
        document.getElementById("walletDisplay").textContent = "Wallet: ₹" + data.newWallet;

        // History update karo taaki bot context yaad rakhe
        chatHistory.push({ role: "user", content: question });
        chatHistory.push({ role: "assistant", content: data.answer });
      } catch (err) {
        messagesBox.innerHTML += `<div style="color:red; margin-bottom:10px;">Error: ${err.message}</div>`;
      } finally {
        sendBtn.disabled = false;
      }
    }

    // Enter dabane pe bhi message send ho jaye
    document.getElementById("chatInput").addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendChatMessage();
    });
  </script>
  </div> <!-- mainApp band -->
</body>
</html>
